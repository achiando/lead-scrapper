<!DOCTYPE html>
<html>
<head>
    <title>Generate Slugs for Existing Clinics</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        button { background: #3b82f6; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2563eb; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Generate Slugs for Existing Clinics</h1>
    <p>This will generate SEO-friendly slugs for all clinics that don't have them yet.</p>
    
    <button onclick="generateSlugs()">Generate Slugs for All Clinics</button>
    
    <div id="result"></div>

    <script>
        async function generateSlugs() {
            const resultDiv = document.getElementById('result');
            const button = document.querySelector('button');
            
            button.disabled = true;
            button.textContent = 'Generating...';
            resultDiv.innerHTML = '<div class="loading">Generating slugs... Please wait.</div>';
            
            try {
                const response = await fetch('/api/debug/generate-slugs', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Success!</h3>
                            <p><strong>Total clinics:</strong> ${data.total}</p>
                            <p><strong>Updated:</strong> ${data.updated}</p>
                            <p><strong>Failed:</strong> ${data.failed}</p>
                            <details>
                                <summary>View Details</summary>
                                <pre>${JSON.stringify(data.results, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Error</h3>
                            <p>${data.error}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Network Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            } finally {
                button.disabled = false;
                button.textContent = 'Generate Slugs for All Clinics';
            }
        }
    </script>
</body>
</html>
